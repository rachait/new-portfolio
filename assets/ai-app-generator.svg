<svg width="1200" height="800" viewBox="0 0 1200 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="800" gradientUnits="userSpaceOnUse">
      <stop stop-color="#08111E"/>
      <stop offset="0.5" stop-color="#0C1020"/>
      <stop offset="1" stop-color="#1A1230"/>
    </linearGradient>
    <linearGradient id="hero" x1="230" y1="70" x2="560" y2="260" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F6F8FF"/>
      <stop offset="1" stop-color="#B7C3FF"/>
    </linearGradient>
    <linearGradient id="hero2" x1="230" y1="260" x2="620" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6C63FF"/>
      <stop offset="1" stop-color="#28C6D6"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1" gradientUnits="userSpaceOnUse">
      <stop stop-color="#182037" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#121829" stop-opacity="0.94"/>
    </linearGradient>
    <linearGradient id="button" x1="0" y1="0" x2="1" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#CBE9FF"/>
      <stop offset="1" stop-color="#9DB4FF"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="12" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="800" rx="32" fill="url(#bg)"/>
  <circle cx="230" cy="90" r="5" fill="#7CA8FF" opacity="0.9"/>
  <circle cx="244" cy="90" r="5" fill="#6C63FF" opacity="0.5"/>
  <text x="258" y="98" fill="#B9C8FF" font-family="Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="3">AI APP GENERATOR</text>

  <text x="230" y="170" fill="url(#hero)" font-family="Arial, sans-serif" font-size="54" font-weight="800">
    <tspan x="230" dy="0">Turn raw ideas</tspan>
    <tspan x="230" dy="72">into a polished</tspan>
    <tspan x="230" dy="72">product</tspan>
    <tspan x="230" dy="72">blueprint.</tspan>
  </text>

  <text x="230" y="365" fill="#8F9BB8" font-family="Arial, sans-serif" font-size="18" line-height="28">
    <tspan x="230" dy="0">Describe the app you want to build and the generator will run a four-stage</tspan>
    <tspan x="230" dy="28">pipeline to produce intent, architecture, schemas, and a refined final</tspan>
    <tspan x="230" dy="28">configuration. The interface feels more like a control room than a demo.</tspan>
  </text>

  <rect x="708" y="130" width="304" height="228" rx="20" fill="url(#panel)" stroke="rgba(255,255,255,0.08)"/>
  <text x="730" y="158" fill="#BAC7E6" font-family="Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="2.5">WHAT MAKES IT UNIQUE</text>
  <rect x="725" y="166" width="274" height="82" rx="14" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.05)"/>
  <text x="741" y="186" fill="#CBE9FF" font-family="Arial, sans-serif" font-size="14" font-weight="700">Product signature</text>
  <text x="741" y="206" fill="#97A4C5" font-family="Arial, sans-serif" font-size="12">Distinct visual language, prompt presets, and</text>
  <text x="741" y="224" fill="#97A4C5" font-family="Arial, sans-serif" font-size="12">compact status cues make the app feel</text>
  <text x="741" y="242" fill="#97A4C5" font-family="Arial, sans-serif" font-size="12">intentionally designed.</text>
  <rect x="725" y="258" width="274" height="82" rx="14" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.05)"/>
  <text x="741" y="278" fill="#CBE9FF" font-family="Arial, sans-serif" font-size="14" font-weight="700">Decision support</text>
  <text x="741" y="298" fill="#97A4C5" font-family="Arial, sans-serif" font-size="12">A built-in ideas board suggests the next</text>
  <text x="741" y="316" fill="#97A4C5" font-family="Arial, sans-serif" font-size="12">features you can add without changing the</text>
  <text x="741" y="334" fill="#97A4C5" font-family="Arial, sans-serif" font-size="12">backend flow.</text>

  <rect x="230" y="372" width="486" height="386" rx="22" fill="url(#panel)" stroke="rgba(255,255,255,0.08)"/>
  <text x="246" y="402" fill="#D8E5FF" font-family="Arial, sans-serif" font-size="16" font-weight="700">Prompt studio</text>
  <circle cx="654" cy="394" r="5" fill="#8BC3FF"/>
  <text x="662" y="399" fill="#B9C8FF" font-family="Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="1.6">FAST START</text>
  <rect x="246" y="416" width="60" height="28" rx="14" fill="#2C3145"/>
  <rect x="312" y="416" width="68" height="28" rx="14" fill="#2C3145"/>
  <rect x="386" y="416" width="86" height="28" rx="14" fill="#2C3145"/>
  <rect x="478" y="416" width="72" height="28" rx="14" fill="#2C3145"/>
  <text x="276" y="435" text-anchor="middle" fill="#D6DFFE" font-family="Arial, sans-serif" font-size="12" font-weight="700">CRM</text>
  <text x="346" y="435" text-anchor="middle" fill="#D6DFFE" font-family="Arial, sans-serif" font-size="12" font-weight="700">Inventory</text>
  <text x="429" y="435" text-anchor="middle" fill="#D6DFFE" font-family="Arial, sans-serif" font-size="12" font-weight="700">Bookings</text>
  <text x="514" y="435" text-anchor="middle" fill="#D6DFFE" font-family="Arial, sans-serif" font-size="12" font-weight="700">Learning</text>

  <text x="246" y="466" fill="#9EACCC" font-family="Arial, sans-serif" font-size="13" font-weight="700">App description</text>
  <rect x="246" y="474" width="446" height="194" rx="14" fill="#0A0F18" stroke="rgba(255,255,255,0.06)"/>
  <text x="260" y="505" fill="#65718F" font-family="Arial, sans-serif" font-size="14">Build a CRM with login, contacts, dashboard, role-based access, and</text>
  <text x="260" y="528" fill="#65718F" font-family="Arial, sans-serif" font-size="14">premium payments</text>
  <rect x="246" y="684" width="86" height="34" rx="17" fill="url(#button)"/>
  <text x="289" y="706" text-anchor="middle" fill="#0B1020" font-family="Arial, sans-serif" font-size="13" font-weight="700">Generate</text>
  <rect x="340" y="684" width="94" height="34" rx="17" fill="#24283A"/>
  <text x="387" y="706" text-anchor="middle" fill="#E6EAFE" font-family="Arial, sans-serif" font-size="13" font-weight="700">Copy prompt</text>
  <rect x="442" y="684" width="88" height="34" rx="17" fill="#202536"/>
  <text x="486" y="706" text-anchor="middle" fill="#E6EAFE" font-family="Arial, sans-serif" font-size="13" font-weight="700">Open runtime</text>
  <circle cx="544" cy="701" r="3" fill="#7BD389"/>
  <text x="556" y="706" fill="#BFD6FF" font-family="Arial, sans-serif" font-size="12">Idle.</text>

  <rect x="726" y="372" width="286" height="386" rx="22" fill="url(#panel)" stroke="rgba(255,255,255,0.08)"/>
  <text x="742" y="402" fill="#D8E5FF" font-family="Arial, sans-serif" font-size="16" font-weight="700">Live signal</text>
  <circle cx="976" cy="394" r="5" fill="#8BC3FF"/>
  <text x="984" y="399" fill="#B9C8FF" font-family="Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="1.6">RESPONSE</text>

  <rect x="742" y="422" width="124" height="52" rx="14" fill="#131A2A" stroke="rgba(255,255,255,0.05)"/>
  <text x="756" y="445" fill="#7784A1" font-family="Arial, sans-serif" font-size="11" letter-spacing="1.8">LATENCY</text>
  <text x="756" y="468" fill="#E9F2FF" font-family="Arial, sans-serif" font-size="24" font-weight="700">--</text>

  <rect x="872" y="422" width="124" height="52" rx="14" fill="#131A2A" stroke="rgba(255,255,255,0.05)"/>
  <text x="886" y="445" fill="#7784A1" font-family="Arial, sans-serif" font-size="11" letter-spacing="1.8">STATE</text>
  <text x="886" y="468" fill="#E9F2FF" font-family="Arial, sans-serif" font-size="24" font-weight="700">Idle</text>

  <rect x="742" y="486" width="254" height="46" rx="14" fill="#131A2A" stroke="rgba(255,255,255,0.05)"/>
  <text x="756" y="508" fill="#7784A1" font-family="Arial, sans-serif" font-size="11" letter-spacing="1.8">ERROR</text>
  <text x="756" y="530" fill="#E9F2FF" font-family="Arial, sans-serif" font-size="18" font-weight="700">None</text>

  <text x="742" y="574" fill="#9EACCC" font-family="Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="1.8">IDEAS TO ADD MORE</text>
  <rect x="742" y="582" width="254" height="82" rx="14" fill="#131A2A" stroke="rgba(255,255,255,0.05)"/>
  <text x="756" y="606" fill="#CBE9FF" font-family="Arial, sans-serif" font-size="14" font-weight="700">Export buttons</text>
  <text x="756" y="626" fill="#96A4C5" font-family="Arial, sans-serif" font-size="12">Add JSON/Markdown exports so generated specs can</text>
  <text x="756" y="644" fill="#96A4C5" font-family="Arial, sans-serif" font-size="12">move into docs or tickets instantly.</text>

  <rect x="742" y="672" width="254" height="72" rx="14" fill="#131A2A" stroke="rgba(255,255,255,0.05)"/>
  <text x="756" y="696" fill="#CBE9FF" font-family="Arial, sans-serif" font-size="14" font-weight="700">Prompt history</text>
  <text x="756" y="716" fill="#96A4C5" font-family="Arial, sans-serif" font-size="12">Store recent prompts locally so users can compare</text>
  <text x="756" y="734" fill="#96A4C5" font-family="Arial, sans-serif" font-size="12">versions and reuse strong requests.</text>

  <text x="230" y="782" fill="url(#hero)" font-family="Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="3">AI APP GENERATOR • PRODUCTION-READY COMPILER</text>
</svg>